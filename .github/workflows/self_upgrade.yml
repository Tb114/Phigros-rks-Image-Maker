name: Self Upgrade

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-specific-files:
    runs-on: ubuntu-latest
    steps:
      # 0. 配置 Git 身份
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      # 1. 检出当前仓库
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 获取远程模板的版本号
      - name: Get remote version
        id: get_remote_version
        run: |
          REMOTE_VERSION=$(curl -s https://raw.githubusercontent.com/Tb114/Phigros-rks-Image-Maker-Template/main/VERSION)
          echo "Remote version: $REMOTE_VERSION"
          echo "remote_version=$REMOTE_VERSION" >> $GITHUB_OUTPUT

      # 3. 获取本地版本号
      - name: Get local version
        id: get_local_version
        run: |
          if [ -f "VERSION" ]; then
            LOCAL_VERSION=$(cat VERSION)
          else
            LOCAL_VERSION="0.0.0"
          fi
          echo "Local version: $LOCAL_VERSION"
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT

      # 4. 比较版本（仅在远程版本更高时继续）
      - name: Compare versions
        id: compare_versions
        run: |
          LOCAL_VERSION="${{ steps.get_local_version.outputs.local_version }}"
          REMOTE_VERSION="${{ steps.get_remote_version.outputs.remote_version }}"
          
          # 只有当远程版本 > 本地版本时才更新
          if [[ "$(printf "%s\n" "$LOCAL_VERSION" "$REMOTE_VERSION" | sort -V | tail -n1)" == "$REMOTE_VERSION" ]] && [[ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]]; then
            echo "Remote version ($REMOTE_VERSION) is newer than local version ($LOCAL_VERSION). Will update specified files."
            echo "need_update=true" >> $GITHUB_OUTPUT
          else
            echo "Local version ($LOCAL_VERSION) is up-to-date or newer. No update needed."
            echo "need_update=false" >> $GITHUB_OUTPUT
          fi

      # 5. 更新指定文件（仅当需要更新时）
      - name: Update specific files from template
        if: steps.compare_versions.outputs.need_update == 'true'
        run: |
          echo "Updating specific files from template..."
          
          # 创建一个临时目录来获取模板文件
          mkdir -p /tmp/template-files
          cd /tmp/template-files
          
          # 下载需要更新的文件列表
          # 这里列出你想要从模板更新的所有文件
          FILES_TO_UPDATE=(
            "main.py"
            "REQUIREMENTS"
            "updatefile.py"
          )
          
          # 下载每个文件
          for file in "${FILES_TO_UPDATE[@]}"; do
            echo "Downloading $file from template..."
            curl -s -o "$file" "https://raw.githubusercontent.com/Tb114/Phigros-rks-Image-Maker-Template/main/$file" || echo "Failed to download $file"
          done
          
          # 返回到工作目录并复制文件
          cd "$GITHUB_WORKSPACE"
          
          # 复制下载的文件到工作目录
          for file in "${FILES_TO_UPDATE[@]}"; do
            if [ -f "/tmp/template-files/$file" ]; then
              echo "Copying $file..."
              cp "/tmp/template-files/$file" .
            fi
          done
          
          # 更新 VERSION 文件为最新版本
          echo "${{ steps.get_remote_version.outputs.remote_version }}" > VERSION
          
          # 清理
          rm -rf /tmp/template-files

      # 6. 提交更新
      - name: Commit updates
        if: steps.compare_versions.outputs.need_update == 'true'
        run: |
          # 检查是否有文件被更改
          if [[ -n $(git status --porcelain) ]]; then
            echo "Changes detected. Committing..."
            
            # 添加更新的文件（明确指定）
            git add VERSION
            git add main.py
            git add REQUIREMENTS
            git add updatefile.py
            # 添加其他你更新的文件
            
            git commit -m "chore: update template files to version ${{ steps.get_remote_version.outputs.remote_version }}"
            git push
            echo "Files updated and committed successfully."
          else
            echo "No files were changed. Skipping commit."
          fi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # 不取消正在运行的，等待完成